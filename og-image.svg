<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="ogbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F7F8FA"/>
    </linearGradient>
    <radialGradient id="ogGlow1" cx="85%" cy="10%" r="55%">
      <stop offset="0%" stop-color="rgba(255, 184, 0, 0.30)"/>
      <stop offset="80%" stop-color="rgba(255, 184, 0, 0)"/>
    </radialGradient>
    <radialGradient id="ogGlow2" cx="10%" cy="100%" r="55%">
      <stop offset="0%" stop-color="rgba(49, 130, 246, 0.18)"/>
      <stop offset="80%" stop-color="rgba(49, 130, 246, 0)"/>
    </radialGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFB800"/>
      <stop offset="50%" stop-color="#FF8A00"/>
      <stop offset="100%" stop-color="#FF6B00"/>
    </linearGradient>
    <linearGradient id="markBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFB800"/>
      <stop offset="100%" stop-color="#FF8A00"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#ogbg)"/>
  <rect width="1200" height="630" fill="url(#ogGlow1)"/>
  <rect width="1200" height="630" fill="url(#ogGlow2)"/>

  <!-- Brand row -->
  <g transform="translate(80 80)">
    <rect width="56" height="56" rx="14" fill="url(#markBg)"/>
    <g transform="translate(28 28)">
      <path
        d="M0 -19 L4 -12 L11 -11 L6 -6 L11 -1 L4 -2 L0 5 L-4 -2 L-11 -1 L-6 -6 L-11 -11 L-4 -12 Z"
        fill="#FFFFFF"
      />
    </g>
    <text
      x="76" y="24"
      font-family="Pretendard, -apple-system, 'Apple SD Gothic Neo', sans-serif"
      font-weight="800" font-size="22" letter-spacing="-0.5"
      fill="#191F28"
    >표도 노트</text>
    <text
      x="76" y="48"
      font-family="Pretendard, -apple-system, 'Apple SD Gothic Neo', sans-serif"
      font-weight="500" font-size="14"
      fill="#8B95A1"
    >MAPLE PLANET · 표창도적 육성 가이드</text>
  </g>

  <!-- Title block -->
  <g transform="translate(80 220)">
    <text
      font-family="Pretendard, -apple-system, 'Apple SD Gothic Neo', sans-serif"
      font-weight="800" font-size="96" letter-spacing="-3"
      fill="#191F28"
    >
      <tspan x="0" y="0">표창 한 발에</tspan>
      <tspan x="0" y="112" fill="url(#grad)">정석</tspan>
      <tspan font-weight="800" fill="#191F28">으로 성장하기</tspan>
    </text>

    <text
      x="0" y="200"
      font-family="Pretendard, -apple-system, 'Apple SD Gothic Neo', sans-serif"
      font-weight="500" font-size="24" letter-spacing="-0.5"
      fill="#4E5968"
    >
      <tspan x="0" dy="0">차수별 스킬트리 · LUK/DEX 스탯 분배 · 레벨별 템트리 · 사냥터 동선</tspan>
      <tspan x="0" dy="34">— 표창도적 정석 육성을 한 페이지에.</tspan>
    </text>
  </g>

  <!-- Decorative shuriken -->
  <g transform="translate(990 320)" opacity="0.95">
    <g transform="rotate(15)">
      <path
        d="M0 -160 L32 -100 L106 -90 L54 -42 L92 30 L18 14 L0 88 L-18 14 L-92 30 L-54 -42 L-106 -90 L-32 -100 Z"
        fill="url(#markBg)"
      />
      <circle r="18" fill="#FFFFFF"/>
    </g>
  </g>

  <!-- Footer chip -->
  <g transform="translate(80 540)">
    <rect width="220" height="44" rx="22" fill="#191F28"/>
    <text
      x="110" y="29"
      text-anchor="middle"
      font-family="Pretendard, -apple-system, 'Apple SD Gothic Neo', sans-serif"
      font-weight="700" font-size="15" letter-spacing="-0.2"
      fill="#FFFFFF"
    >가이드 보러가기 →</text>
  </g>
</svg>
